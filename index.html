<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oração de Bênção Divina</title>
<script>
  (function () {
    const path = window.location.pathname;
    const query = window.location.search;

    if (path.startsWith('/en') || path.startsWith('/es')) {
      return;
    }

    const idioma = navigator.language || navigator.userLanguage || 'pt';

    if (idioma.startsWith('en')) {
      window.location.href = '/en/' + query;
    } else if (idioma.startsWith('es')) {
      window.location.href = '/es/' + query;
    }
  })();
</script>
  <meta name="theme-color" content="#0b1020" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <style>
    :root{
      --overlay: rgba(0,0,0,.45);
      --card: rgba(17,24,39,.72);
      --muted:#cbd5e1; 
      --text:#f1f5f9;
      --primary:#a7f3d0; 
      --accent:#fcd34d;
      --gold:#facc15; 
      --deepgold:#ca8a04;
    }
    *{box-sizing:border-box}
    body{
      margin:0; 
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      color:var(--text); 
      background:#0b1020; 
      min-height:100vh;
    }
    .bg{
      position:fixed;
      inset:0;
      background:#0b1020 url('https://images.unsplash.com/photo-1503264116251-35a269479413?auto=format&fit=crop&w=1950&q=80') center/cover no-repeat;
    }
    .bg::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(2,6,23,.4),rgba(2,6,23,.75));
    }
    .wrap{
      position:relative;
      z-index:1;
      display:grid;
      place-items:center;

      padding:24px
    }
    .card{
      width:min(860px,96vw); 
      background:var(--card);

      border:1px solid rgba(255,255,255,.08); 
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,.45);
    }
    .header{padding:26px 26px 10px}
    .header-top{

      align-items:center;
      justify-content:space-between;
      gap:12px;

    .badge{

    .channel-icon{

      border-radius:10px;

      display:none

    .progress-bar{
      height:100%;

<body>

 </div>

  <!-- Som de harpa -->
  <audio id="harpa" preload="auto" src="/audio/harpa.mp3"></audio>
  <script>
    /* ====== Config ====== */
    const ENDPOINT = "https://oracaooo.onrender.com/tts";

    const VOICE_MASC   = "4YYIPFl9wE5c4L2eu2Gb";      // masculina
    const VOICE_FEM    = "FrzKLwOr0y3qieiphjs2";      // feminina
    const VOICE_GIRL   = "hO2yZ8lxM3axUxL8OeKX";      // infantil menina
    const VOICE_BOY    = "M5t0724ORuAGCh3p3DUR";      // infantil menino

    const VOICES = {
      masc: VOICE_MASC,
      fem:  VOICE_FEM,
      girl: VOICE_GIRL,
      boy:  VOICE_BOY
    };

    /* ====== Elementos ====== */
    const nomeInput   = document.getElementById('nome');
    const vozSel      = document.getElementById('voz');
    const statusEl    = document.getElementById('status');
    const player      = document.getElementById('player');
    const btnOuvir    = document.getElementById('btn-ouvir');
    const btnDownload = document.getElementById('btn-download');
    const progress    = document.getElementById('progress');
    const bar         = document.getElementById('progress-bar');
    const harpa       = document.getElementById('harpa');
    const chkMute     = document.getElementById('silenciarHarpa');

    /* ====== Status helper ====== */
    function setStatus(texto, classe){
      statusEl.classList.remove('ok','err','loading');
      if (classe) statusEl.classList.add(classe);
      statusEl.innerHTML = texto;
    }

    /* ====== Som de conclusão ====== */
    if (harpa) harpa.volume = 0.35;
    const setMuted = (m)=>{harpa.muted=m;localStorage.setItem('oracao.muted',m?'1':'0');};
    chkMute.addEventListener('change',()=>setMuted(chkMute.checked));
    (()=>{ 
      const m=localStorage.getItem('oracao.muted')==='1'; 
      chkMute.checked=m; 
      setMuted(m); 
    })();

    /* ====== Preferência de voz ====== */
    (() => {
      const saved = localStorage.getItem('oracao.voz');
      if (saved && VOICES[saved]) vozSel.value = saved;
    })();
    vozSel.addEventListener('change', () => {
      localStorage.setItem('oracao.voz', vozSel.value);
    });
function aplicarParametrosDaUrl(){
  const params = new URLSearchParams(window.location.search);

  const nome = params.get('nome');
  const tipo = params.get('tipo');
  const voz = params.get('voz');

  if (nome) {
    nomeInput.value = nome;
  }

  if (tipo && document.querySelector(`#tipo option[value="${tipo}"]`)) {
    document.getElementById('tipo').value = tipo;
  }

  if (voz && VOICES[voz]) {
    vozSel.value = voz;
    localStorage.setItem('oracao.voz', voz);
  }
}

window.addEventListener('load', aplicarParametrosDaUrl);

    /* ====== Textos (parágrafos) ====== */
    const ORACOES = {
      bencao: [
`{{nome}}, respire fundo... Agora, receba esta oração.

O Senhor te chama pelo nome. Que a paz que excede todo entendimento preencha o teu coração.
Onde houver medo, que entre a confiança; onde houver dor, que floresça cura; onde houver dúvida, que se levante a fé.`,
`Que a luz de Deus ilumine teus passos hoje e sempre.
Que Ele te cubra com favor diante dos homens e te guie com sabedoria em cada decisão.`,
`Seja sua vida abençoada, {{nome}}. Que a graça do Altíssimo te envolva agora e para sempre. Amém.`
      ],

      gratidao: [
`{{nome}}, hoje levantamos a nossa voz em gratidão.
Pelo dom da vida, pelas pequenas alegrias, pelos livramentos que nem vimos.`,
`Que teu coração se encha de reconhecimento, e que a gratidão abra portas de favor.
Onde houver murmúrio, que nasça louvor; onde houver falta, que floresça provisão.`,
`Obrigado, Senhor, por tudo que já fizeste e pelo que ainda farás na vida de {{nome}}. Amém.`
      ],

      aniversario: [
`Hoje, Senhor, agradecemos pela vida de {{nome}}.
Cada ano é um presente Teu, uma nova chance de florescer na fé, na sabedoria e no amor.`,
`Abençoa os caminhos de {{nome}}, trazendo saúde, alegria e realizações.
Que os sonhos se renovem, que a esperança nunca se apague e que Tua luz te conduza em cada passo.`,
`Parabéns, {{nome}}! Que a graça divina te envolva hoje e sempre. Amém.`
      ],

      manha: [
`{{nome}}, ao despertar, acolhe a luz de Deus.
Que teus pensamentos sejam guiados pela sabedoria, e tuas decisões, pela paz.`,
`Onde houver ansiedade, que reine calma; onde houver cansaço, que venha ânimo.
Senhor, abençoa o caminho de {{nome}} neste dia, e firma seus passos.`,
`Que a Tua presença acompanhe {{nome}} desde agora e para sempre. Amém.`
      ],

      tarde: [
`{{nome}}, que esta tarde seja guiada pela presença de Deus.
Que cada passo seja conduzido pela sabedoria e cada pensamento pelo discernimento divino.`,
`Que o Senhor renove tuas forças, acalme tua mente e organize tudo aquilo que parecia fora do lugar.
Que Ele abra portas certas e feche caminhos que não te pertencem.`,
`Que esta tarde seja leve, produtiva e cheia da graça de Deus sobre a tua vida, {{nome}}. Amém.`
      ],

      noite: [
`{{nome}}, que o descanso desta noite seja guardado pelo Altíssimo.
Que os anjos acampem ao teu redor, e toda inquietação se transforme em serenidade.`,
`O que foi dor, seja cura; o que foi peso, aprendizado.
Derrama, Senhor, Tua paz sobre o coração de {{nome}}.`,
`Dorme em paz, {{nome}}. Deus vela por ti. Amém.`
      ],

      protecao: [
`{{nome}}, que o Senhor seja teu escudo e a tua fortaleza.
Que nenhum mal alcance tua morada e teus passos sejam firmados na luz.`,
`Que a presença de Deus afaste toda sombra e te revista de coragem.
Anjos do Senhor, acampem ao redor de {{nome}} e sustentem sua vida.`,
`Cobre, Senhor, a vida de {{nome}} com proteção hoje e sempre. Amém.`
      ]
    };

    /* ====== Cache TTS ====== */
    const TTS_CACHE_NAME='tts-audios-v1';
    async function sha256Hex(s){
      const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }
    async function getFromCache(key){
      const c=await caches.open(TTS_CACHE_NAME);
      const r=await c.match(new Request(key));
      return r?await r.blob():null;
    }
    async function putInCache(key,b){
      const c=await caches.open(TTS_CACHE_NAME);
      await c.put(new Request(key),new Response(b,{headers:{'Content-Type':'audio/mpeg'}}));
    }
    async function getOrGenerateAudio({text,voiceId}){
      const key='/tts-cache/'+await sha256Hex(voiceId+'::'+text);
      const cached=await getFromCache(key);
      if(cached && cached.size>0) return{blob:cached,fromCache:true};

      const r=await fetch(ENDPOINT,{
        method:'POST',
        mode:'cors',
        headers:{'Content-Type':'application/json','Accept':'audio/mpeg'},
        body:JSON.stringify({text,voiceId})
      });
      if(!r.ok) throw new Error(r.status);
      const blob=await r.blob();
      putInCache(key,blob).catch(()=>{});
      return{blob,fromCache:false};
    }

    /* ====== Gerar áudio + UI ====== */
    async function gerarAudio(){
      const tipo = document.getElementById('tipo').value;
      const nome = (nomeInput.value||'').trim();
      const voiceId = VOICES[vozSel.value] || VOICE_MASC;

      const texto = (ORACOES[tipo] || [])
        .map(p => p.replace(/\{\{\s*nome\s*\}\}/gi, nome || ''))
        .join('\n\n');

      setStatus('🙏 Preparando a oração...', 'loading');
      progress.style.display='block'; 
      bar.style.width='0%';
      btnOuvir.disabled=true;

      let pct=0;
      const loader=setInterval(()=>{
        pct=Math.min(pct+Math.random()*15,95);
        bar.style.width=pct+'%';
      },380);

      try{
        const {blob,fromCache}=await getOrGenerateAudio({text:texto,voiceId});
        clearInterval(loader); 
        bar.style.width='100%'; 
        setTimeout(()=>progress.style.display='none',700);

        const url=URL.createObjectURL(blob);
        player.src=url;
        player.play().catch(()=>{});

       btnDownload.href = url;

const nomeArquivo = (nome || 'bencao')
  .normalize('NFD')
  .replace(/[\u0300-\u036f]/g, '')
  .toLowerCase()
  .replace(/\s+/g, '-');

const hoje = new Date().toISOString().slice(0,10);

btnDownload.download =
  `oracao-${tipo}-${nomeArquivo}-${hoje}.mp3`;

btnDownload.style.display = 'inline-flex';

        setStatus(fromCache ? '⚡ Oração carregada instantaneamente!' : '✨ Oração gerada com sucesso!', 'ok');

        harpa?.pause(); 
        try{harpa.currentTime=0;}catch{}
        harpa?.play().catch(()=>{});
      }catch(e){
        clearInterval(loader); 
        progress.style.display='none';
        setStatus('❌ Erro ao gerar áudio. Tente novamente.', 'err');
        console.error('[TTS] Falha:', e);
      }finally{
        btnOuvir.disabled=false;
      }
    }
    btnOuvir.addEventListener('click',gerarAudio);

    /* ====== Compartilhamento ====== */
    const SITE_URL = location.origin + location.pathname;
    function montarLinkPersonalizado(){
  const tipo = document.getElementById('tipo').value;
  const nome = (nomeInput.value || '').trim();
  const voz = vozSel.value;

  const params = new URLSearchParams();

  if (nome) params.set('nome', nome);
  params.set('tipo', tipo);
  params.set('voz', voz);

  return `${location.origin}${location.pathname}?${params.toString()}`;
}

function montarMsg(){
  const n = (nomeInput.value || '').trim();
  const prefix = n ? `${n}, ` : '';

  const linkPersonalizado = montarLinkPersonalizado();

  return `${prefix}receba esta Oração de Bênção Divina 🙏

Ouça sua oração aqui:
${linkPersonalizado}

Que Deus ilumine seus passos hoje e sempre. Amém.`;
}
    document.getElementById('btn-whats')?.addEventListener('click',()=>{
      const msg=montarMsg();
      if(navigator.share){
        navigator.share({title:'Oração de Bênção Divina',text:msg,url:SITE_URL}).catch(()=>{});
        return;
      }
      window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank','noopener');
    });
    document.getElementById('btn-telegram')?.addEventListener('click',()=>{
      const msg=montarMsg();
      const tg=`https://t.me/share/url?url=${encodeURIComponent(SITE_URL)}&text=${encodeURIComponent(msg)}`;
      window.open(tg,'_blank','noopener');
    });

    /* ====== PWA ====== */
    if("serviceWorker" in navigator){
      navigator.serviceWorker.register("./sw.js").catch(console.error);
    }
  </script>
